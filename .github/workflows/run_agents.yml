name: AE9-Labs Automated Growth Agents

on:
  # Run automatically every day at 12:00 PM UTC (8:00 AM EST)
  schedule:
    - cron: '0 12 * * *'
  
  # Allows you to click a button in GitHub and trigger it manually anytime!
  workflow_dispatch:

jobs:
  execute-agents:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Agent Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Run Lead Acquisition Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          python lead_acquisition_agent.py

      - name: Run Social Media Content Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: |
          python content_engine_agent.py
